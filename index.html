<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David's Projects</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: #0D0D12; 
            color: #FAF8F5; 
            margin: 0; 
        }
        h1 { 
            margin-bottom: 3rem; 
            font-size: 3rem;
            letter-spacing: -0.02em;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        a { 
            display: block;
            text-align: center;
            color: #FAF8F5; 
            font-size: 1.5rem; 
            text-decoration: none; 
            padding: 20px 40px; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 2rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            background: rgba(255,255,255,0.03);
        }
        a:hover { 
            background: #FAF8F5; 
            color: #0D0D12; 
            transform: translateY(-2px) scale(1.02);
            border-color: #FAF8F5;
        }
    </style>
</head>
<body>
    <h1>David's Projects</h1>
    <div class="links">
        <a href="/primeweb/">Prime Web</a>
        <a href="/masterbarbershop/">Master Barbershop</a>
        <a href="/shieldfire/">Shield Fire</a>
    </div>
</body>
</html>
